<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#002d72" />
    <meta name="description" content="ERD cutoff request" />
    <title>ERD Cutoff Request</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page" aria-label="ERD cutoff request preview">
      <img
        class="page-background"
        src="/erd-cutoff-background.png"
        alt="ERD cutoff request webpage"
        draggable="false"
      />

      <section
        id="doviber-stage"
        class="doviber-stage"
        role="status"
        aria-live="polite"
        aria-label="Lance and Davis meet for a high five"
        hidden
      >
        <div class="doviber-person doviber-davis">
          <img id="davis-pose" src="/doviber-davis-walk-smile-v2.webp" alt="Davis in Hapag-Lloyd gear" />
          <div id="davis-greeting" class="doviber-speech doviber-speech-davis">Hey Hood ..</div>
          <div id="davis-farewell" class="doviber-speech doviber-speech-exit-davis" hidden>Later, old weirdo friend.</div>
        </div>

        <div id="lance" class="doviber-person doviber-lance" hidden>
          <img id="lance-pose" src="/doviber-lance-walk.webp" alt="Lance in Hapag-Lloyd gear" />
          <span id="tooth-glint" class="doviber-tooth-glint" aria-hidden="true" hidden></span>
          <div id="lance-greeting" class="doviber-speech doviber-speech-lance">Wassup DOViber!</div>
          <div id="lance-farewell" class="doviber-speech doviber-speech-exit-lance" hidden>Hoodlove out!</div>
          <div id="lance-quip" class="doviber-speech doviber-speech-quip" hidden>Millennials, loki right Steven?</div>
        </div>

        <div id="kazoow" class="doviber-kazoow" aria-label="Zoink" hidden>ZOINK!</div>

        <div id="rail-curtain" class="rail-curtain" aria-label="The rail team applauds" hidden>
          <div class="rail-curtain-member rail-curtain-a">
            <div id="rail-line-a" class="doviber-speech rail-curtain-speech" hidden>Huzzah!</div>
            <div class="rail-curtain-portrait">
              <img class="rail-curtain-head" src="/rail-team-a-head.webp" alt="Rail team member applauding" />
              <img class="rail-curtain-arm rail-curtain-arm-left" src="/rail-team-a-wave.webp" alt="" aria-hidden="true" />
              <img class="rail-curtain-arm rail-curtain-arm-right" src="/rail-team-a-wave.webp" alt="" aria-hidden="true" />
            </div>
          </div>

          <div class="rail-curtain-member rail-curtain-b">
            <div id="rail-line-b" class="doviber-speech rail-curtain-speech" hidden>You put the D in IT</div>
            <div class="rail-curtain-portrait">
              <img class="rail-curtain-head" src="/rail-team-b-head.webp" alt="Rail team member applauding" />
              <img class="rail-curtain-arm rail-curtain-arm-left" src="/rail-team-b-wave.webp" alt="" aria-hidden="true" />
              <img class="rail-curtain-arm rail-curtain-arm-right" src="/rail-team-b-wave.webp" alt="" aria-hidden="true" />
            </div>
          </div>

          <div class="rail-curtain-member rail-curtain-c">
            <div id="rail-line-c" class="doviber-speech rail-curtain-speech" hidden>I'm done, just wow</div>
            <div class="rail-curtain-portrait">
              <img class="rail-curtain-head" src="/rail-team-c-head.webp" alt="Rail team member shaking his head" />
              <img class="rail-curtain-arm rail-curtain-arm-left" src="/rail-team-c-wave.webp" alt="" aria-hidden="true" />
              <img class="rail-curtain-arm rail-curtain-arm-right" src="/rail-team-c-wave.webp" alt="" aria-hidden="true" />
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/script.js"></script>
  </body>
</html>
